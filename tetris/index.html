<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tetris Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <a href="../index.html" id="menu-btn">← Menú</a>
        <div id="top-ui">
            <div id="info-row">
                <div id="score">Puntos: 0</div>
                <div id="level">Nivel: 1</div>
                <div id="best-score">Mejor: <span id="best-score-value">0</span></div>
                <div id="name-input-container">
                    <input type="text" id="player-name" maxlength="12" placeholder="Nombre">
                </div>
            </div>
            <div id="controls-row">
                <div id="sound-controls">
                    <button id="mute-btn" title="Mute">🔊</button>
                    <button id="bgm-mute-btn" title="Mute Music">🎵</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <div id="next-piece-container">
                    <span>Siguiente:</span>
                    <canvas id="next-canvas" width="80" height="80"></canvas>
                </div>
                <button id="pause-btn">Pausa</button>
            </div>
        </div>
        <div id="board-wrapper">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div id="pause-overlay">
                <h1 id="overlay-title">TETRIS</h1>
                <button id="start-btn">START</button>
                <div id="high-scores-table" style="display:none;">
                    <h3>Top 5 Records</h3>
                    <table id="high-scores-list"></table>
                </div>
            </div>
        </div>
        <div id="touch-controls">
            <button class="touch-btn" data-action="left">←</button>
            <button class="touch-btn" data-action="rotate">↻</button>
            <button class="touch-btn" data-action="right">→</button>
            <button class="touch-btn" data-action="down">↓</button>
            <button class="touch-btn" data-action="drop">⬇⬇</button>
            <button class="touch-btn" data-action="restart">R</button>
        </div>
    </div>
    <script src="js/constants.js"></script>
    <script src="js/tetriminos.js"></script>
    <script src="js/input.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
