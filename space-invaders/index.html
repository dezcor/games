<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Invaders</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <a href="../index.html" id="menu-btn">← Menu</a>
        <div id="top-ui">
            <div id="info-row">
                <div id="score">Score: 0</div>
                <div id="lives">Lives: 3</div>
                <div id="best-score">Best: <span id="best-score-value">0</span></div>
                <div id="name-input-container">
                    <input type="text" id="player-name" maxlength="12" placeholder="Name">
                </div>
            </div>
            <div id="controls-row">
                <div id="sound-controls">
                    <button id="mute-btn" title="Mute">🔊</button>
                    <button id="bgm-mute-btn" title="Mute Music">🎵</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <button id="pause-btn">Pause</button>
            </div>
        </div>
        <div id="board-wrapper">
            <canvas id="invaders" width="240" height="400"></canvas>
            <div id="pause-overlay">
                <h1 id="overlay-title">SPACE INVADERS</h1>
                <button id="start-btn">START</button>
                <div id="high-scores-table" style="display:none;">
                    <h3>Top 5 Records</h3>
                    <table id="high-scores-list"></table>
                </div>
            </div>
        </div>
        <div id="touch-controls">
            <button class="touch-btn" data-action="left" title="Left">
                <svg width="20" height="20" viewBox="0 0 20 20"><path d="M4 10L14 16V4L4 10Z" fill="#22d3ee"/></svg>
            </button>
            <button class="touch-btn" data-action="shoot" title="Shoot">
                <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 2v6l3-3 2 2-5 5-5-5 2-2 3 3V2h4z" fill="#fbbf24"/></svg>
            </button>
            <button class="touch-btn" data-action="right" title="Right">
                <svg width="20" height="20" viewBox="0 0 20 20"><path d="M16 10L6 4V16L16 10Z" fill="#22d3ee"/></svg>
            </button>
            <button class="touch-btn" data-action="restart" title="Restart">↻</button>
        </div>
    </div>
    <script src="js/constants.js"></script>
    <script src="js/input.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
