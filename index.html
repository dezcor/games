<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #202028;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .games-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .game-card {
            background: #2a2a35;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 32px;
            width: 260px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: #f0c419;
            box-shadow: 0 8px 24px rgba(240, 196, 25, 0.15);
        }
        .game-icon {
            font-size: 64px;
            line-height: 1;
        }
        .game-title {
            font-size: 24px;
            font-weight: bold;
        }
        .game-desc {
            color: #aaa;
            font-size: 14px;
            line-height: 1.4;
        }
        .play-btn {
            margin-top: 8px;
            padding: 8px 24px;
            background: #f0c419;
            color: #202028;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .game-card:hover .play-btn {
            background: #ffd633;
        }
        footer {
            margin-top: 48px;
            color: #555;
            font-size: 13px;
        }
        @media (max-width: 400px) {
            h1 {
                font-size: 36px;
            }
            .subtitle {
                font-size: 14px;
                margin-bottom: 24px;
            }
            .game-card {
                padding: 24px 20px;
                width: 90%;
                max-width: 300px;
            }
            .game-icon {
                font-size: 48px;
            }
            .game-title {
                font-size: 20px;
            }
            .game-desc {
                font-size: 13px;
            }
            .play-btn {
                font-size: 14px;
                padding: 6px 20px;
            }
            footer {
                margin-top: 32px;
            }
        }
        @media (max-width: 340px) {
            h1 {
                font-size: 30px;
            }
            .game-card {
                padding: 20px 16px;
            }
            .game-icon {
                font-size: 40px;
            }
            .game-title {
                font-size: 18px;
            }
            .game-desc {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Games Hub</h1>
        <p class="subtitle">Seleccioná un juego para empezar</p>

        <div class="games-grid">
            <a class="game-card" href="tetris/index.html">
                <div class="game-icon">🧱</div>
                <div class="game-title">Tetris</div>
                <div class="game-desc">El clásico juego de bloques. Apilá, completá líneas y alcanzá el puntaje más alto.</div>
                <span class="play-btn">Jugar</span>
            </a>

            <a class="game-card" href="snake/index.html">
                <div class="game-icon">🐍</div>
                <div class="game-title">Snake</div>
                <div class="game-desc">Controlá la serpiente, comé comida y crecé sin chocarte contra vos mismo.</div>
                <span class="play-btn">Jugar</span>
            </a>
        </div>

        <footer>Dezcor Games</footer>
    </div>
</body>
</html>
